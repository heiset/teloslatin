<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telos Latin</title>
  <style>
    :root { --bg:#000; --fg:#fff; --green:#39ff14; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('bg.jpg') center/cover no-repeat;
      z-index: -2;
    }

    body {
      font-family: "Times New Roman", Georgia, serif;
      color: var(--fg);
      background: var(--bg);
      display: grid;
      place-items: center;
      min-height: 100vh;
      cursor: url('z.png'), auto;
    }

    .panel {
      text-align: center;
      width: min(480px, 92vw);
    }

    h1 {
      font-size: clamp(32px, 5vw, 48px);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--green);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    a.btn {
      display: block;
      color: var(--fg);
      text-decoration: none;
      border: 2px solid var(--fg);
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 18px;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    a.btn:hover {
      background: var(--fg);
      color: var(--bg);
    }

    a.btn .latin {
      display: block;
      font-size: 13px;
      opacity: 0.6;
      margin-top: 3px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Telos Latin</h1>
    <p class="subtitle">Mr. Heise's Latin Classroom</p>

    <div class="btn-group">
      <a class="btn" href="flashcards.html">
        Random Deck
        <span class="latin">fasciculus fortuitus</span>
      </a>
      <a class="btn" href="decks.html">
        Choose a Deck
        <span class="latin">elige fasciculum</span>
      </a>
      <a class="btn" href="game.html">
        Caverna Lunae
        <span class="latin">play the game</span>
      </a>
      <a class="btn" href="syllabus.html">
        Syllabus
        <span class="latin">index rerum</span>
      </a>
    </div>
  </div>
</body>
</html>
