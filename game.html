<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caverna Lunae</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
      background: #f7f4ee;
      color: #222;
    }
    #output {
      border: 1px solid #bbb;
      background: white;
      padding: 16px;
      min-height: 320px;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    input {
      width: 70%;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }
    .row {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
  <h1>Caverna Lunae</h1>
  <div id="output"></div>
  <div class="row">
    <input id="answer" type="text" placeholder="scribe hic..." autocomplete="off" />
    <button id="submit">Responde</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
