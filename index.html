<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telos Latin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('bg.jpg') center/cover no-repeat;
      z-index: -2;
    }

    body {
      font-family: "Times New Roman", Georgia, serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      cursor: url('z.png'), auto;
    }

    .panel {
      background: #fff;
      color: #000;
      padding: 48px 56px;
      text-align: center;
      width: min(400px, 88vw);
    }

    h1 {
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.5;
      margin-bottom: 36px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    a.btn {
      display: block;
      color: #000;
      text-decoration: none;
      font-size: 18px;
      font-family: inherit;
      transition: opacity 0.15s ease;
    }

    a.btn:hover {
      opacity: 0.5;
    }

    a.btn .latin {
      display: block;
      font-size: 12px;
      opacity: 0.45;
      margin-top: 2px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Telos Latin</h1>
    <p class="subtitle">Mr. Heise's Latin Classroom</p>

    <div class="btn-group">
      <a class="btn" href="flashcards.html">
        Random Deck
        <span class="latin">fasciculus fortuitus</span>
      </a>
      <a class="btn" href="decks.html">
        Choose a Deck
        <span class="latin">elige fasciculum</span>
      </a>
      <a class="btn" href="game.html">
        Caverna Lunae
        <span class="latin">play the game</span>
      </a>
      <a class="btn" href="syllabus.html">
        Syllabus
        <span class="latin">index rerum</span>
      </a>
    </div>
  </div>
</body>
</html>
