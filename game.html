<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Archivum Romae</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: white;
      color: black;
      font-family: Papyrus, "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: 24px;
      line-height: 1.45;
    }

    body {
      padding: 24px;
      padding-bottom: 90px;
    }

    #output {
      white-space: pre-wrap;
    }

    #inputLine {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 18px;
      background: white;
    }

    #promptMark {
      display: inline-block;
    }

    #answer {
      border: none;
      outline: none;
      background: white;
      color: black;
      caret-color: black;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      width: 80%;
    }

    .cursor {
      display: none;
    }
  </style>
</head>

<body>
  <div id="output"></div>

  <div id="inputLine">
    <span id="promptMark">&gt; </span><input id="answer" type="text" autocomplete="off" spellcheck="false" autofocus>
  </div>

  <script src="game.js"></script>
</body>
</html>
